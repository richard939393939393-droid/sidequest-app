name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22 for Capacitor
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Fix styles.css brace balance
        run: |
          python3 -c "
          with open('src/styles.css', 'r') as f:
              css = f.read()
          opens = css.count('{')
          closes = css.count('}')
          while closes > opens:
              idx = css.rfind('}')
              css = css[:idx] + css[idx+1:]
              closes -= 1
          with open('src/styles.css', 'w') as f:
              f.write(css)
          print(f'CSS fixed: {opens} opens, {closes} closes')
          "

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Fix ajv dependency
        run: |
          npm install ajv@^8.0.0 --legacy-peer-deps
          npm install ajv-keywords@^5.0.0 --legacy-peer-deps

      - name: Build React app
        run: npm run build
        env:
          CI: false
          SKIP_PREFLIGHT_CHECK: true
          NODE_OPTIONS: --openssl-legacy-provider

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps

      - name: Initialize Capacitor
        run: npx cap init SideQuest com.sidequest.app --web-dir=build

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Clean Gradle cache
        working-directory: android
        run: ./gradlew clean

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sidequest-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
